<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unwritten Tales - Lecteur BD</title>

    <style>
        /* Définition de la police Black Aroug */
        @font-face {
            font-family: 'Black Aroug';
            src: url('BlackAroug-DemoVersion-Regular.otf') format('opentype'),
                url('BlackAroug-DemoVersion-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Styles de base */
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://i.imgur.com/xBLzhCU.png'); 
            background-size: cover; 
            background-attachment: fixed; 
            background-color: #000; 
            color: #fff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px; 
            margin: 0 auto;
            padding: 0 20px 12px 20px;
            background-color: #1a1a1ad6;
            border-radius: 10px;
            border: 2px solid #8B0000; 
            box-sizing: border-box; 
        }

        h2 {
            font-family: 'Black Aroug', sans-serif; 
            font-size: 5.313em; 
            font-weight: normal; 
            letter-spacing: 3px; 
            margin-bottom: -10px;
            color: #FFFFFF; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9),
                         0 0 20px rgba(255, 255, 255, 0.6); 
            margin-top: 20px;
        }
        
        .title-divider {
            width: 65%; 
            height: 3px; 
            background-color: #FFFFFF; 
            margin: 0 auto 20px auto; 
            border-radius: 10px; 
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 1); 
        }

        #chapter, #tome-select {
            padding: 10px;
            border-radius: 5px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            font-size: 1em;
            z-index: 6;
            margin-bottom: 0.5em; 
        }

        #page-info {
            font-weight: bold;
            font-size: 1.2em;
            z-index: 5;
            margin-bottom:0.4rem;
        }

        .select-group {
            display: flex;
            gap: 10px; 
            align-items: flex-end;
        }

        .align{ 
            display: flex;
            flex-direction: row;
            justify-content: space-between; 
            align-items: flex-end;
            max-width: 860px; 
            margin: 0 auto; 
        }

        #page {
            max-width: 100%;
            border: 2px solid #fff;
            border-radius: 8px;
            height: auto;
            min-height: 200px;
            background-color: #222;
            display: block;
            margin: 0 auto; 
            cursor: pointer;
        }

        #buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn {
            min-width: 180px; 
            padding: 12px 3rem; 
            background-color: #8B0000; 
            color: white;
            border: none;
            border-radius: 5px; 
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        #redirect-btn {
            min-width: auto; 
            padding: 12px 3rem; 
            background-color: #C68182; 
            margin-top: 5px;
        }

        .nav-btn:hover:not([disabled]), #redirect-btn:hover {
            background-color: #B22222 !important; 
        }

        .nav-btn:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        /* --- STYLES DU MODAL (GROS PLAN) --- */
        #image-modal {
            display: none;
            position: fixed;
            z-index: 9999; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(0,0,0,0.95); 
        }

        #close-modal {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10001;
        }

        .modal-content {
            margin: auto;
            display: block;
            width: auto;
            height: auto;
            max-width: 90vw; 
            max-height: 90vh; 
            object-fit: contain; 
            animation: zoom 0.3s;
            cursor: pointer; /* Indique qu'on peut cliquer pour suivant */
        }

        /* Flèches de navigation dans le modal */
        .modal-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 60px;
            font-weight: bold;
            padding: 20px;
            cursor: pointer;
            user-select: none;
            transition: 0.3s;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .modal-arrow:hover {
            background: rgba(139, 0, 0, 0.8);
        }

        #modal-prev { left: 20px; }
        #modal-next { right: 20px; }

        #caption-full {
            margin: auto;
            display: block;
            width: 80%;
            text-align: center;
            color: #ccc;
            padding: 10px 0;
        }

        @keyframes zoom {
            from {transform:scale(0.8); opacity: 0;} 
            to {transform:scale(1); opacity: 1;}
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Unwritten Tales</h2>
        <div class="title-divider"></div> 
        <div class="align">
            <div class="select-group"> 
                <select id="tome-select"></select>
                <select id="chapter"></select>
            </div>
            <p id="page-info">Page 0 / 0</p> 
        </div>
        <div>
            <img id="page" src="" alt="Page de la bande dessinée">
        </div>

        <div id="buttons">
            <button id="prev-btn" class="nav-btn" disabled>Précédent</button>
            <button id="next-btn" class="nav-btn" disabled>Suivant</button>
        </div>
        <a href="https://sypha-rose-ffxiv.carrd.co/"><button id="redirect-btn" class="nav-btn">Back to Carrd</button></a>
    </div>
    
    <div id="image-modal">
        <span id="close-modal">&times;</span>
        
        <div id="modal-prev" class="modal-arrow">&#10094;</div>
        
        <img class="modal-content" id="img-full" title="Cliquez pour la page suivante">
        
        <div id="modal-next" class="modal-arrow">&#10095;</div>
        
        <div id="caption-full"></div>
    </div>

    <script>
        // --- STRUCTURE DE DONNÉES ---
        const tomes = {
            "before-the-blizzard": { 
                name: "Before the blizzard", 
                chapters: {
                    1: { 
                        name: "Chapitre 1", 
                        pages: [
                            "https://i.imgur.com/ewGwyID.png", "https://i.imgur.com/gsSfjFk.png", "https://i.imgur.com/69GS82v.png", "https://i.imgur.com/VdvTYvo.png", "https://i.imgur.com/53yXM5o.png", "https://i.imgur.com/XnV6bd6.png", "https://i.imgur.com/iAtsktj.png", "https://i.imgur.com/rH508i9.png", "https://i.imgur.com/8AsVepq.png", "https://i.imgur.com/s8tV91i.png", "https://i.imgur.com/Qhg6LxD.png", "https://i.imgur.com/dkdliIX.png", "https://i.imgur.com/M0BzLB3.png", "https://i.imgur.com/BRph5bM.png", "https://i.imgur.com/MupHgly.png", "https://i.imgur.com/lg1dTRF.png", "https://i.imgur.com/7o8uXZ9.png", "https://i.imgur.com/pcDUvu9.png"
                        ]
                    }
                }
            },
            "a-realm-reborn": {
                name: "A Realm Reborn",
                chapters: {
                    1: { name: "Chapitre 1", pages: [] }
                }
            },
            "heavensward": {
                name: "Heavensward",
                chapters: {
                    1: { name: "Chapitre 1", pages: [] }
                }
            },
            "stormblood": {
                name: "Stormblood",
                chapters: {
                    1: { name: "Chapitre 1", pages: [] }
                }
            },
            "shadowbringer": {
                name: "Shadowbringer", 
                chapters: {
                    1: {
                        name: "Chapitre 1", 
                        pages: ["https://i.imgur.com/0UNHl1a.png", "https://i.imgur.com/84OHQMM.png", "https://i.imgur.com/qrCB5R6.png", "https://i.imgur.com/Nhbccgj.png", "https://i.imgur.com/rCEL2QH.png", "https://i.imgur.com/6LdfBzs.png", "https://i.imgur.com/ryE2mWw.png", "https://i.imgur.com/RR7lXn7.png", "https://i.imgur.com/7rUoApX.png", "https://i.imgur.com/Zq8UWbI.png", "https://i.imgur.com/yrW1y4p.png", "https://i.imgur.com/0dgnbvZ.png", "https://i.imgur.com/IcOeYq6.png", "https://i.imgur.com/mX9BMDh.png"]
                    },
                    2: {
                        name: "Chapitre 2",
                        pages: ["https://i.imgur.com/bSwLhWW.png", "https://i.imgur.com/tDpoBMZ.png", "https://i.imgur.com/3AoNX7n.png", "https://i.imgur.com/W1ksv6d.png", "https://i.imgur.com/J2kRcBG.png", "https://i.imgur.com/91mesK9.png", "https://i.imgur.com/kJeDYZa.png", "https://i.imgur.com/vQatVkB.png", "https://i.imgur.com/5pmvOV8.png", "https://i.imgur.com/OR8BTVX.png", "https://i.imgur.com/V2FivjT.png", "https://i.imgur.com/D7MmvtA.png", "https://i.imgur.com/X0KMBQk.png", "https://i.imgur.com/aVv98at.png", "https://i.imgur.com/cwfTDTc.png"]
                    },
                    3: {
                        name: "Chapitre 3",
                        pages: ["https://i.imgur.com/9IgnOGv.jpeg", "https://i.imgur.com/U5BKdFF.png", "https://i.imgur.com/z2LgHIc.png", "https://i.imgur.com/aanENlF.png", "https://i.imgur.com/qvzZNTq.png", "https://i.imgur.com/N36SGef.png", "https://i.imgur.com/LcZGYoE.png", "https://i.imgur.com/3JE2ms3.png", "https://i.imgur.com/UhCnYGC.png", "https://i.imgur.com/86gI24z.png", "https://i.imgur.com/mbr7bIQ.png"]
                    },
                    4: {
                        name: "Chapitre 4",
                        pages: ["https://i.imgur.com/kzWrhhl.png", "https://i.imgur.com/WgljjNE.png", "https://i.imgur.com/CZWNIsZ.png", "https://i.imgur.com/I6Z5mpg.png", "https://i.imgur.com/EyIq4y9.png", "https://i.imgur.com/dH6OxSX.png", "https://i.imgur.com/AvgQ4De.png", "https://i.imgur.com/EguXrNX.png", "https://i.imgur.com/iCx58SS.png", "https://i.imgur.com/v875nwQ.png", "https://i.imgur.com/OnktZl4.png", "https://i.imgur.com/GxpCakI.png", "https://i.imgur.com/MTL7KTs.png"]
                    }
                }
            },
            "endwalker": {
                name: "Endwalker",
                chapters: {
                    1: { name: "Chapitre 1", pages: [] }
                }
            },
            "dawntrail": {
                name: "Dawntrail",
                chapters: {
                    1: { name: "Chapitre 1", pages: [] }
                }
            }
        };
        
        // --- LOGIQUE DU LECTEUR ---
        const DOM = {
            tomeSelect: document.getElementById("tome-select"),
            chapterSelect: document.getElementById("chapter"),
            img: document.getElementById("page"),
            pageInfo: document.getElementById("page-info"),
            prevBtn: document.getElementById("prev-btn"),
            nextBtn: document.getElementById("next-btn"),
            modal: document.getElementById("image-modal"),
            modalImg: document.getElementById("img-full"),
            modalPrev: document.getElementById("modal-prev"),
            modalNext: document.getElementById("modal-next"),
            captionText: document.getElementById("caption-full"),
            closeModal: document.getElementById("close-modal")
        };

        let currentTomeKey, currentChapterKey, currentPageIndex = 0;

        function getCurrentChapter() { return tomes[currentTomeKey]?.chapters[currentChapterKey]; }
        
        function appendOption(selectElement, value, text) {
            const option = document.createElement('option');
            option.value = value; option.textContent = text;
            selectElement.appendChild(option);
        }

        function initTomeSelect() {
            for (const key in tomes) { appendOption(DOM.tomeSelect, key, tomes[key].name); }
            currentTomeKey = DOM.tomeSelect.value;
            updateChapterOptions();
        }

        function updateChapterOptions() {
            DOM.chapterSelect.innerHTML = ''; 
            const chapters = tomes[currentTomeKey]?.chapters;
            if (!chapters || Object.keys(chapters).length === 0) {
                DOM.chapterSelect.innerHTML = '<option value="">Pas de chapitres</option>';
                DOM.chapterSelect.disabled = true;
                loadChapter(""); return;
            }
            DOM.chapterSelect.disabled = false;
            for (const key in chapters) { appendOption(DOM.chapterSelect, key, chapters[key].name); }
            loadChapter(DOM.chapterSelect.value); 
        }

        function updateReader() {
            const chapter = getCurrentChapter(); 
            const totalPages = chapter ? chapter.pages.length : 0; 
            if (totalPages > 0) {
                const imgSrc = chapter.pages[currentPageIndex];
                const imgAlt = `Tome : ${tomes[currentTomeKey].name}, Chapitre : ${chapter.name}, Page : ${currentPageIndex + 1}`;
                
                // Update Main Image
                DOM.img.src = imgSrc;
                DOM.img.alt = imgAlt;
                DOM.pageInfo.textContent = `Page ${currentPageIndex + 1} / ${totalPages}`;
                
                // Update Modal Image if it's open
                if (DOM.modal.style.display === "block") {
                    DOM.modalImg.src = imgSrc;
                    DOM.captionText.innerHTML = imgAlt;
                }

                DOM.prevBtn.disabled = (currentPageIndex === 0);
                DOM.nextBtn.disabled = (currentPageIndex === totalPages - 1);
            } else {
                DOM.img.src = ""; DOM.pageInfo.textContent = "Page 0 / 0";
                DOM.prevBtn.disabled = DOM.nextBtn.disabled = true;
            }
        }

        function loadChapter(ch) { currentChapterKey = ch; currentPageIndex = 0; updateReader(); }
        function goPrevious() { if (currentPageIndex > 0) { currentPageIndex--; updateReader(); return true; } return false; }
        function goNext() { const c = getCurrentChapter(); if (c && currentPageIndex < c.pages.length - 1) { currentPageIndex++; updateReader(); return true; } return false; }

        function setupEventListeners() {
            DOM.tomeSelect.addEventListener("change", (e) => { currentTomeKey = e.target.value; updateChapterOptions(); });
            DOM.chapterSelect.addEventListener("change", (e) => loadChapter(e.target.value));
            
            // Navigation boutons principaux
            DOM.prevBtn.addEventListener("click", goPrevious);
            DOM.nextBtn.addEventListener("click", goNext);
            
            // Ouvrir le modal
            DOM.img.addEventListener("click", () => {
                if (DOM.img.src) {
                    DOM.modal.style.display = "block";
                    updateReader(); // S'assure que le modal est à jour
                }
            });

            // Navigation dans le modal
            DOM.modalPrev.addEventListener("click", (e) => {
                e.stopPropagation(); // Évite de fermer le modal si on clique sur la flèche
                goPrevious();
            });
            DOM.modalNext.addEventListener("click", (e) => {
                e.stopPropagation();
                goNext();
            });
            DOM.modalImg.addEventListener("click", (e) => {
                e.stopPropagation();
                if(!goNext()) {
                    // Si on est à la dernière page, on peut éventuellement fermer le modal
                    // DOM.modal.style.display = "none"; 
                }
            });

            // Fermer le modal
            DOM.closeModal.addEventListener("click", () => DOM.modal.style.display = "none");
            window.addEventListener("click", (e) => { if (e.target == DOM.modal) DOM.modal.style.display = "none"; });
            
            // Touches clavier
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") DOM.modal.style.display = "none";
                if (e.target.tagName === 'SELECT') return;
                if (e.key === "ArrowLeft") goPrevious();
                if (e.key === "ArrowRight") goNext();
            });
        }

        initTomeSelect();
        setupEventListeners();
    </script>
</body>
</html>
